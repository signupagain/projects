version: '3.8'

services:
  grafana:
    image: grafana/grafana-oss:latest  # 指定 OSS 版本，確保穩定
    container_name: grafana_app        # 在 Dashboard 顯示的容器名稱
    restart: always                    # 電腦重啟或 Docker 重啟時自動啟動
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=            # 如果以後有想裝的套件可以寫在這
    volumes:
      - grafana_storage:/var/lib/grafana

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_app
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # 需要建立這個設定檔
       # 把 rootDir 的憑證掛載進去
      - ./certs/localhost.pem:/etc/prometheus/localhost.pem
      - ./certs/localhost-key.pem:/etc/prometheus/localhost-key.pem
      - ./certs/rootCA.pem:/etc/prometheus/rootCA.pem

volumes:
  grafana_storage:                     # 定義持久化儲存空間名稱
    name: grafana_persistent_data      # 在 Docker Volumes 清單中顯示的名稱
